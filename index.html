<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simplified Google Keep clone for note-taking">
    <meta name="theme-color" content="#ffffff">
    
    <title>Google Keep Clone</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    < <!--NAVIGATION BAR -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-brand">
            <i class="fas fa-sticky-note" aria-hidden="true"></i>
            <h1>Google Keep Clone</h1>
        </div>
        <div class="navbar-actions">
            <button 
                class="btn-archive" 
                id="archiveBtn" 
                title="View archived notes (Press A)" 
                aria-label="Toggle archive view"
                data-tooltip="Archive View"
            >
                <i class="fas fa-archive" aria-hidden="true"></i>
                <span class="badge" id="archiveCount">0</span>
            </button>
        </div>
    </nav>

    <!--MAIN CONTENT -->
    <main class="container" role="main">
        <!-- Content will be added in next steps -->
    </main>

    <script src="js/script.js"></script>
</body>
</html>
