<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simplified Google Keep clone for note-taking">
    <meta name="theme-color" content="#ffffff">
    
    <title>Google Keep Clone</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    < <!--NAVIGATION BAR -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-brand">
            <i class="fas fa-sticky-note" aria-hidden="true"></i>
            <h1>Google Keep Clone</h1>
        </div>
        <div class="navbar-actions">
            <button 
                class="btn-archive" 
                id="archiveBtn" 
                title="View archived notes (Press A)" 
                aria-label="Toggle archive view"
                data-tooltip="Archive View"
            >
                <i class="fas fa-archive" aria-hidden="true"></i>
                <span class="badge" id="archiveCount">0</span>
            </button>
        </div>
    </nav>

    <!--MAIN CONTENT -->
    <main class="container" role="main">
        <!-- Content will be added in next steps -->
    </main>
    <!--NOTE CREATOR-->
        <section class="note-creator" id="noteCreator" aria-label="Create a new note">
            <!-- Collapsed State -->
            <div 
                class="note-creator-trigger" 
                id="creatorTrigger" 
                role="button" 
                tabindex="0"
                aria-expanded="false"
                aria-controls="creatorContent"
            >
                <i class="fas fa-plus" aria-hidden="true"></i>
                <span>Take a note...</span>
                <span class="keyboard-shortcut">Press N to create</span>
            </div>
            
            <!-- Expanded State -->
            <div class="note-creator-content" id="creatorContent" role="form">
                <div class="form-group">
                    <label for="noteTitleInput" class="sr-only">Note title</label>
                    <input 
                        type="text" 
                        class="note-title-input" 
                        id="noteTitleInput" 
                        placeholder="Title" 
                        autocomplete="off"
                        maxlength="100"
                    >
                </div>
                
                <div class="form-group">
                    <label for="noteContentInput" class="sr-only">Note content</label>
                    <textarea 
                        class="note-content-input" 
                        id="noteContentInput" 
                        placeholder="Take a note..." 
                        rows="3"
                        maxlength="1000"
                    ></textarea>
                </div>
                
                <div class="note-creator-actions">
                    <button 
                        class="btn-close" 
                        id="closeCreatorBtn"
                        title="Close (Esc)"
                    >
                        <i class="fas fa-times" aria-hidden="true"></i> Close
                    </button>
                    <button 
                        class="btn-add" 
                        id="addNoteBtn"
                        title="Save note (Ctrl+Enter)"
                    >
                        <i class="fas fa-plus" aria-hidden="true"></i> Add Note
                    </button>
                </div>
                
                <div class="note-creator-hint">
                    <small>Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to save</small>
                </div>
            </div>
        </section>

        <!--NOTES DISPLAY-->
        <section class="notes-container" id="notesContainer" aria-label="Your notes">
            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">Your Notes</h2>
                <span class="section-count" id="sectionCount">0 notes</span>
            </div>
            
            <div class="notes-grid" id="notesGrid">
                <!-- Notes will be dynamically injected here -->
            </div>
        </section>
    </main>
    <!--ARCHIVE MODAL -->
    <div 
        class="modal" 
        id="archiveModal" 
        role="dialog" 
        aria-modal="true" 
        aria-label="Archived notes"
        aria-hidden="true"
    >
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>
                    <i class="fas fa-archive" aria-hidden="true"></i>
                    Archived Notes
                </h2>
                <button 
                    class="modal-close" 
                    id="closeModalBtn" 
                    aria-label="Close archive"
                    title="Close (Esc)"
                >
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <div class="modal-body" id="archiveGrid">
                <!-- Archived notes will appear here -->
            </div>
        </div>
    </div>

    <!--TOAST NOTIFICATION -->
    <div 
        class="toast" 
        id="toast" 
        role="alert" 
        aria-live="polite"
        aria-atomic="true"
    >
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
