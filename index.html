<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <img class="logo-img" src="https://cdn-icons-png.flaticon.com/512/2965/2965358.png" alt="Google Keep Clone logo">
            <h1>Google Keep <span>Clone</span></h1>
        </div>
        <div class="search-area">
            <input type="text" id="search-bar" placeholder="Search notes..." aria-label="Search notes">
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" aria-label="Note sections">
            <button id="nav-notes" class="nav-btn active" type="button" aria-pressed="true" data-tooltip="View active notes">Notes</button>
            <button id="nav-archive" class="nav-btn" type="button" aria-pressed="false" data-tooltip="View archived notes">Archive</button>
        </aside>

        <main class="workspace">
            <section class="note-creator-container" aria-label="Create a note">
                <form id="note-form">
                    <input type="text" id="note-title" placeholder="Title" class="hidden" aria-label="Note title">
                    <textarea id="note-text" placeholder="Take a note..." rows="1" required aria-label="Note content"></textarea>
                    <div id="form-actions" class="hidden">
                        <button type="submit" id="submit-note-btn" data-tooltip="Add note to your list">Add Note</button>
                        <button type="button" id="close-form-btn" data-tooltip="Close note creator">Close</button>
                    </div>
                </form>
            </section>

            <section id="notes-grid" class="notes-grid" aria-live="polite"></section>
        </main>
    </div>

    <div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title-heading">
        <div class="modal-content">
            <h3 id="modal-title-heading">Edit Note</h3>
            <input type="text" id="modal-title" aria-label="Edit note title">
            <textarea id="modal-text" rows="4" aria-label="Edit note content"></textarea>
            <div class="modal-actions">
                <button id="save-modal-btn" type="button">Save</button>
                <button id="close-modal-btn" type="button">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
